<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry Form</title>

    

  <link rel="stylesheet" href="style.css">
</head>

<body class="enquiry-form">
  
  <nav class="form-nav"> 
                <div class="nav-logo">Larry B </div>
            <ul class="form-links">
                  <li><a href="#">New Arrivals</a> </li> 
                 <li><a href="#">Best Sellers</a> </li> 
                 <li><a href="#">Accessories</a> </li> 
                 </ul>
 </nav>

 <h1 class="form-header">Make An Enquiry</h1>

  <main class="form-container">
    <p class="form-subtitle">
      Please fill in the form below to make an enquiry,
      and a member of our team will get back to you.
    </p>

    <form>

      <!-- NAME -->
      <div class="form-group">
        <label>Name</label>
        <div class="name-row">
          <input type="text" placeholder="First name">
          <input type="text" placeholder="Last name">
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <!-- WHATSAPP -->
      <div class="form-group">
        <p class="info-text">
          Your WhatsApp number (this will be your primary contact detail)
        </p>
        <label>WhatsApp Number</label>
        <input type="tel" id="whatsapp-input" placeholder="Enter number">
      </div>

      <!-- DATE -->
      <div class="form-group">
        <label>When do you need your dress(es)?</label>
        <input type="date">
      </div>

      <!-- SERVICES -->
      <div class="form-group">
        <label>Which service are you interested in?</label>
        <div class="radio-group">
          <label><input type="radio" name="service"> White Wedding Dress</label>
          <label><input type="radio" name="service"> Non-Bridal Dresses</label>
          <label><input type="radio" name="service"> Other Bridal Dresses</label>
          <label><input type="radio" name="service"> Shop the Collection</label>
        </div>
      </div>

      <!-- SHIPPING -->
      <div class="form-group">
        <label>Do you require shipping?</label>
        <div class="radio-group">
          <label><input type="radio" name="shipping"> Yes</label>
          <label><input type="radio" name="shipping"> No (Pickup in Lagos)</label>
        </div>
      </div>

      <!-- ADDRESS -->
      <div class="form-group">
        <label>Delivery Address</label>
        <input type="text" placeholder="Enter your address">
      </div>

      <!-- EXTRA INFO -->
      <div class="form-group">
        <label>Additional Information</label>
        <textarea rows="5"></textarea>
      </div>

      <!-- BUTTON -->
      <button type="submit">Submit</button>

    </form>
  </main>

  
</body>
</html>
