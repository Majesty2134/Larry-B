<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enquiry Form</title>  
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="script.js" defer></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="enquiry-form">
  
  <nav>
         <span><img src="images/slazzer-preview-2dxfd.png" class="nav-logo"></span>  
         <span><div class="nav-logo-text">LarryB</div></span>
            <ul class="nav-links">
                  <li><a href="#">New Arrivals</a> </li> 
                 <li><a href="#">Best Sellers</a> </li> 
                 <li><a href="#">Accessories</a> </li> 
            </ul>
                 <div id="cart-modal">  
                    <div class="cart-box">
                          <h2>Your Cart</h2>
                      <div id="cart-items"></div>
                         <p id="cart-total"></p>
                         </div>
                         </div>
                            </div>
                 <div class="nav-icons">
                 <div class="cart-icon">
                    <i class="fa fa-shopping-bag" id="cart-btn"></i> 
                    <span id="cart-count">0</span>
                        </div>  
                     <i class="fa fa-user"></i>
                    </div>
                    
                </nav>

 <h1 class="form-header">Make An Enquiry</h1>

  <main class="form-container">
    <p class="form-subtitle">
      Please fill in the form below to make an enquiry,
      and a member of our team will get back to you.
    </p>

    <form>
 
      <!-- NAME -->
      <div class="form-group">
        <label>Name:</label>
        <div class="name-row">
         <input type="text" name="first_name" placeholder="First name">
          <input type="text" name="last_name" placeholder="Last name">
        </div>
      </div>
 

 
      <!-- EMAIL -->
      <div class="form-group">
        <label>Email:</label>
      <input type="email" name="email" placeholder="Enter your email">
      </div>
 
  
      <!-- WHATSAPP -->
      <div class="form-group">
        <p class="info-text">
          Your WhatsApp number (this will be your primary contact detail)
        </p>
        <label>WhatsApp Number:</label>
        <input type="tel" name="whatsapp" placeholder="Enter number">
      </div>
 

 
      <!-- DATE -->
      <div class="form-group">
        <label>When do you need your dress(es)?</label>
       <input type="date" name="date_needed">
      </div>
 

 
      <!-- SERVICES -->
      <div class="form-group">
        <label>Which service are you interested in?</label>
        <div class="radio-group">
          <label><input type="radio" name="service" value="Bespoke White Wedding Dress">Bespoke Enquiry White Weddind Dress</label>
          <label><input type="radio" name="service" value="Other Bridal Dresses">Bespoke Enquiry other bridal dresses(e.g, traditional, reception,after party)</label>
        <label><input type="radio" name="service" value="Dinner/Party Dresses"> Dinner Dresses, party dresses E.T.C</label>
        </div>
      </div>
 

 
      <!-- SHIPPING -->
      <div class="form-group">
        <label>Do you require shipping?</label>
        <div class="radio-group">
          <label><input type="radio" name="shipping" value="Yes">Yes</label>
         <label><input type="radio" name="shipping" value="No - Pickup in Lagos">No (Pickup in Lagos)</label>
        </div>
      </div>
 

 
      <!-- ADDRESS -->
      <div class="form-group">
        <label>Delivery Address</label>
       <input type="text" name="address" placeholder="Enter your address">
      </div>
 

  
      <!-- EXTRA INFO -->
      <div class="form-group">
        <label>Additional Information</label>
      <textarea name="message" rows="5"></textarea>
      </div>
 
  
      <!-- BUTTON -->
      <button type="submit" class="submit">Submit</button>
 
    </form>
  </main>

  
</body>
</html>
